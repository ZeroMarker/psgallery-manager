name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Pester
        shell: pwsh
        run: |
          Set-PSRepository PSGallery -InstallationPolicy Trusted
          Install-Module -Name Pester -MinimumVersion 5.0 -Scope CurrentUser -Force

      - name: Run Tests
        shell: pwsh
        run: |
          $config = New-PesterConfiguration
          $config.Run.Path = './Tests'
          $config.Run.Exit = $true
          $config.Output.Verbosity = 'Detailed'
          Invoke-Pester -Configuration $config

  release:
    name: GitHub Release
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build module package
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}" -replace '^v',''
          $nupkgDir = "./out"
          New-Item -ItemType Directory -Path $nupkgDir -Force | Out-Null

          $manifestPath = './PsGalleryManager.psd1'
          $content = Get-Content $manifestPath -Raw
          $content = $content -replace "ModuleVersion\s*=\s*'[^']*'", "ModuleVersion     = '$version'"
          Set-Content $manifestPath -Value $content

          $stagingDir = Join-Path $nupkgDir "PsGalleryManager"
          New-Item -ItemType Directory -Path $stagingDir -Force | Out-Null
          Copy-Item -Path ./*.ps1, ./*.psd1, ./*.psm1, ./Public, ./Private -Destination $stagingDir -Recurse -ErrorAction SilentlyContinue
          Compress-Archive -Path "$stagingDir/*" -DestinationPath "$nupkgDir/PsGalleryManager-$version.zip"

      - name: Extract release notes
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}" -replace '^v',''
          $lines = Get-Content './CHANGELOG.md'
          $capture = $false
          $notes = @()

          foreach ($line in $lines) {
            if ($line -match "^## \[$([regex]::Escape($version))\]") {
              $capture = $true
              continue
            }
            if ($capture -and $line -match '^## \[') {
              break
            }
            if ($capture) {
              $notes += $line
            }
          }

          if ($notes.Count -eq 0) {
            $notes = @("## Changes", "")
            try {
              $prevTag = git describe --tags --abbrev=0 HEAD^ 2>$null
              if ($prevTag) {
                $notes += (git log --oneline --no-decorate "${prevTag}..HEAD")
              }
            } catch {}
            if ($notes.Count -le 2) {
              $notes += (git log --oneline --no-decorate)
            }
          }

          $notes -join "`n" | Set-Content -Path './release-notes.md' -Encoding UTF8

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: ./release-notes.md
          files: ./out/PsGalleryManager-*.zip

  publish:
    name: Publish to PSGallery
    needs: release
    runs-on: ubuntu-latest
    environment: PSGallery
    steps:
      - uses: actions/checkout@v4

      - name: Build module for publish
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}" -replace '^v',''
          $stagingDir = './staging/PsGalleryManager'
          New-Item -ItemType Directory -Path $stagingDir -Force | Out-Null

          Copy-Item -Path './PsGalleryManager.psd1','./PsGalleryManager.psm1' -Destination $stagingDir
          Copy-Item -Path './Public','./Private' -Destination $stagingDir -Recurse -ErrorAction SilentlyContinue

          # Update version in staged manifest
          $manifestPath = Join-Path $stagingDir 'PsGalleryManager.psd1'
          $content = Get-Content $manifestPath -Raw
          $content = $content -replace "ModuleVersion\s*=\s*'[^']*'", "ModuleVersion     = '$version'"
          Set-Content $manifestPath -Value $content

          $manifest = Test-ModuleManifest -Path $manifestPath -ErrorAction Stop
          Write-Host "Module: $($manifest.Name)" -ForegroundColor Cyan
          Write-Host "Version: $($manifest.Version)" -ForegroundColor Cyan
          Write-Host "Functions: $($manifest.ExportedFunctions.Count)" -ForegroundColor Cyan

          Import-Module $manifestPath -Force -ErrorAction Stop
          $commands = Get-Command -Module PsGalleryManager
          Write-Host "Loaded commands: $($commands.Count)" -ForegroundColor Green

      - name: Publish to PSGallery
        shell: pwsh
        env:
          PSGALLERY_API_KEY: ${{ secrets.PSGALLERY_API_KEY }}
        run: |
          if (-not $env:PSGALLERY_API_KEY) {
            Write-Error "PSGALLERY_API_KEY secret is not configured."
            exit 1
          }

          $stagingDir = './staging/PsGalleryManager'
          $manifest = Test-ModuleManifest -Path "$stagingDir/PsGalleryManager.psd1" -ErrorAction Stop

          Write-Host "Publishing $($manifest.Name) v$($manifest.Version) to PSGallery..." -ForegroundColor Cyan
          Publish-Module -Path $stagingDir -NuGetApiKey $env:PSGALLERY_API_KEY -Repository PSGallery -Force -ErrorAction Stop
          Write-Host "Published successfully!" -ForegroundColor Green

          Start-Sleep -Seconds 10
          $published = Find-Module -Name $manifest.Name -Repository PSGallery -ErrorAction SilentlyContinue
          if ($published -and $published.Version -eq $manifest.Version) {
            Write-Host "Verified: v$($published.Version) is live on PSGallery" -ForegroundColor Green
          } else {
            Write-Warning "Publication may take a few minutes to propagate."
          }
